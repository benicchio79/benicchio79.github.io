<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <main class="main-content">
      <!-- HEADER COM LOGO À ESQUERDA E MENU À DIREITA -->
      <header class="site-header">
        <div class="site-title">
          <a href="{{ '/' | relative_url }}">divagar.blog</a>
        </div>
        <nav class="site-nav">
          <ul>
            <li><a href="{{ '/sobre' | relative_url }}">Sobre</a></li>
            <li><a href="{{ '/outros-lugares' | relative_url }}">Outros lugares</a></li>
            <li><a href="{{ '/busca' | relative_url }}">Busca</a></li>
            <li><a href="{{ '/receba-atualizacoes' | relative_url }}">Receba atualizações</a></li>
          </ul>
        </nav>
      </header>

      {{ content }}
    </main>

  </div>

  <footer class="site-footer">
    <p><a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA</a> • {{ site.time | date: '%Y' }} {{ site.title }} ~ Thiago Benicchio • <a href="{{ '/notas-tecnicas' | relative_url }}">notas técnicas</a></p>
  </footer>
  <script data-goatcounter="https://divagar.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
