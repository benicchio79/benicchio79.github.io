---
layout: default
---

<h2>{% include tag-cloud.html %}</h2>

<h1>>> {{ page.tag }}</h1>

<ul class="post-list">
  {% for post in site.tags[page.tag] %}
    <li>
      <a href="{{ post.url | relative_url }}" class="post-title">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%d.%m.%Y" }}</span>
    </li>
  {% endfor %}
</ul>
