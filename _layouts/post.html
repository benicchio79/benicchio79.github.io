---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  <date>{{ page.date | date: "%d/%m/%Y" }}</date>

   <!-- Tags do post -->
  {% if page.tags.size > 0 %}
    <div class="post-tags">
      <span class="tags-label">Tags:</span>
      {% for tag in page.tags %}
        <a href="{{ '/tags/' | relative_url }}{{ tag | slugify }}/" class="post-tag">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </div>
  {% endif %}
  {{ content }}
</article>
