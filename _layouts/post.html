---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  <date>{{ page.date | date: "%d/%m/%Y" }}</date>

   <!-- Tags do post -->
  {% if page.tags.size > 0 %}
    <div class="post-tags">
      <span class="tags-label">Tags:</span>
      {% for tag in page.tags %}
        <a href="{{ '/tags/' | relative_url }}{{ tag | slugify }}/" class="post-tag">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </div>
  {% endif %}
  {{ content }}
<br>
<br>
<h3>>> Gostou? <a href="/receba-atualizacoes/">Receba a newsletter ou assine o RSS</a></h3>
<br>
<br>
<!-- COMENTÁRIOS REMARK42 -->
  <div id="remark42"></div>
  <script>
    var remark_config = {
      host: 'https://comentarios.divagar.blog',
      site_id: 'divagar-blog',
      components: ['embed'],
      max_shown_comments: 5,
      theme: 'dark',
      locale: 'bp',
      show_email_subscription: true,
      no_footer: true,
      admin: true
    };
  </script>
  <script>
    !function(e,n){for(var o=0;o<e.length;o++){var r=n.createElement("script"),c=".js",d=n.head||n.body;"noModule"in r?(r.type="module",c=".mjs"):r.async=!0,r.defer=!0,r.src=remark_config.host+"/web/"+e[o]+c,d.appendChild(r)}}(remark_config.components||["embed"],document);
  </script>
  <noscript>Please enable JavaScript to view the comments.</noscript>



</article>
