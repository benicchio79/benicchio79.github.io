---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  <date>{{ page.date | date: "%d/%m/%Y" }}</date>

   <!-- Tags do post -->
  {% if page.tags.size > 0 %}
    <div class="post-tags">
      <span class="tags-label">Tags:</span>
      {% for tag in page.tags %}
        <a href="{{ '/tags/' | relative_url }}{{ tag | slugify }}/" class="post-tag">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </div>
  {% endif %}
  {{ content }}
<br>
<br>
<h3>>> Gostou? <a href="/receba-atualizacoes/">Receba a newsletter ou assine o RSS</a></h3>
<br>
<br>
<div id="cusdis_thread"
  data-host="https://cusdis.divagar.blog"
  data-app-id="14896d87-4162-40ee-bdc8-76c89b1bf478"
  data-page-id="{{ page.url }}"
  data-page-url="{{ page.url | absolute_url }}"
  data-page-title="{{ page.title }}"
  data-theme="dark">
</div>
<script async defer src="https://cusdis.divagar.blog/js/cusdis.es.js"></script>



</article>
