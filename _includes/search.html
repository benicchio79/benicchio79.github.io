<div class="search-container">
  <input type="text" id="search-input" placeholder="Buscar no site..." autocomplete="off">
  <div id="search-results"></div>
</div>

<script>
  // Coleta todos os posts e páginas
  const pages = [
    {% for page in site.pages %}
      { title: "{{ page.title | escape }}", url: "{{ page.url | relative_url }}", content: "{{ page.content | strip_html | escape }}" },
    {% endfor %}
    {% for post in site.posts %}
      { title: "{{ post.title | escape }}", url: "{{ post.url | relative_url }}", content: "{{ post.content | strip_html | escape }}" },
    {% endfor %}
  ];

  const searchInput = document.getElementById('search-input');
  const resultsDiv = document.getElementById('search-results');

  searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    if (query.length < 3) {
      resultsDiv.innerHTML = '';
      return;
    }

    const results = pages.filter(page => 
      page.title.toLowerCase().includes(query) || 
      page.content.toLowerCase().includes(query)
    ).slice(0, 10); // limite de 10 resultados

    if (results.length === 0) {
      resultsDiv.innerHTML = '<p>Nenhum resultado encontrado.</p>';
      return;
    }

    resultsDiv.innerHTML = '<ul>' + results.map(page => 
      `<li><a href="${page.url}">${page.title}</a></li>`
    ).join('') + '</ul>';
  });
</script>
