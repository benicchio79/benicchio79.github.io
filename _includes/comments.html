<section id="isso-thread"></section>
<script data-isso="https://isso.divagar.blog/"
        data-isso-lang="pt_BR"
        src="https://isso.divagar.blog/js/embed.min.js"></script>

<style>
  /* Placeholders via CSS (funciona na maioria dos navegadores modernos) */
  #isso-thread input[name="author"]::placeholder {
    content: "opcional" !important;
  }
  
  #isso-thread input[type="email"]::placeholder {
    content: "opcional" !important;
  }
  
  #isso-thread input[type="url"]::placeholder {
    content: "opcional" !important;
  }
  
  /* Placeholder do textarea */
  #isso-thread .isso-textarea::placeholder {
    content: "Seu comentário (Markdown suportado)" !important;
  }

  /* ========== BOTÕES LADO A LADO ========== */
  #isso-thread .isso-post-action {
    display: flex !important;
    flex-direction: row !important;
    gap: 10px !important;
    align-items: center !important;
  }

  #isso-thread .isso-post-action input[type="submit"] {
    padding: 5px 14px !important;
    font-size: 0.85rem !important;
    background-color: #88aaff !important;
    color: #0e0525 !important;
    border: none !important;
    border-radius: 4px !important;
    font-weight: bold !important;
    cursor: pointer !important;
    width: auto !important;
  }

  @media (max-width: 400px) {
    #isso-thread .isso-post-action {
      flex-direction: column !important;
      align-items: stretch !important;
    }
    #isso-thread .isso-post-action input {
      width: 100% !important;
    }
  }

  /* ========== CHECKBOX DE NOTIFICAÇÃO ========== */
  #isso-thread .isso-subscribe-to-replies {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    margin-top: 12px !important;
  }
  
  #isso-thread .isso-subscribe-to-replies label {
    font-size: 0.7rem !important;
    color: #cccccc !important;
    margin: 0 !important;
  }
  
  #isso-thread .isso-subscribe-to-replies input[type="checkbox"] {
    width: 14px !important;
    height: 14px !important;
    margin: 0 !important;
    accent-color: #88aaff !important;
  }

</style>

<script>
  (function() {
    function ajustarPlaceholders() {
      // Campo Nome - seletor específico
      var author = document.querySelector('#isso-thread input[name="author"]');
      if (author) author.placeholder = 'opcional';
      
      // Campo Email - seletor específico
      var email = document.querySelector('#isso-thread input[type="email"]');
      if (email) email.placeholder = 'opcional';
      
      // Campo Website - seletor específico
      var website = document.querySelector('#isso-thread input[type="url"]');
      if (website) website.placeholder = 'opcional';
      
      // Campo Comentário - seletor específico
      var textarea = document.querySelector('#isso-thread .isso-textarea');
      if (textarea) textarea.placeholder = 'Seu comentário (Markdown suportado)';
    }
    
    // Executa após a página carregar
    window.addEventListener('load', ajustarPlaceholders);
    setTimeout(ajustarPlaceholders, 500);
    setTimeout(ajustarPlaceholders, 1000);
  })();
</script>
