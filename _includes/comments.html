<!-- Isso Comments -->
<section id="isso-thread"></section>
<script data-isso="https://isso.divagar.blog/"
        data-isso-lang="pt_BR"
        src="https://isso.divagar.blog/js/embed.min.js"></script>

<script>
(function() {
    function ajustarPlaceholders() {
        var inputs = document.querySelectorAll('#isso-thread input, #isso-thread textarea');
        inputs.forEach(function(input) {
            if (input.name === 'author') input.placeholder = 'opcional';
            if (input.type === 'email') input.placeholder = 'opcional';
            if (input.type === 'url') input.placeholder = 'opcional';
        });
    }
    ajustarPlaceholders();
    setTimeout(ajustarPlaceholders, 500);
    setTimeout(ajustarPlaceholders, 1000);
})();
</script>
