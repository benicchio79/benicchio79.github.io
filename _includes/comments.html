{% comment %}
  Cusdis - Comentários abertos sem login
  Tema escuro para combinar com o blog
{% endcomment %}


<div id="cusdis_thread"
  data-host="https://cusdis.divagar.blog"
  data-app-id="14896d87-4162-40ee-bdc8-76c89b1bf478"
  data-page-id="{{ page.url }}"
  data-page-url="{{ page.url | absolute_url }}"
  data-page-title="{{ page.title }}"
  data-theme="dark">
</div>
<script async defer src="http://cusdis.local/js/cusdis.es.js"></script>

<script>
  // Ajusta a altura após o iframe carregar
  function fixIframeHeight() {
    var iframe = document.querySelector('#cusdis_thread iframe');
    if (iframe && iframe.contentDocument) {
      var height = iframe.contentDocument.body.scrollHeight;
      iframe.style.height = height + 'px';
    }
  }

  // Tenta ajustar quando a página carregar e depois de alguns segundos
  window.addEventListener('load', function() {
    setTimeout(fixIframeHeight, 500);
    setTimeout(fixIframeHeight, 1500);
    setTimeout(fixIframeHeight, 3000);
  });
</script>
