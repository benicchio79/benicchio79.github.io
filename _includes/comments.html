<!-- Isso Comments -->
<section id="isso-thread"></section>

<script data-isso="https://isso.divagar.blog/"
        data-isso-lang="pt_BR"
        src="https://isso.divagar.blog/js/embed.min.js"></script>

<style>
  /* ========== ISSO - ESTILOS FUNCIONAIS ========== */
  
  h4.isso-thread-heading {
    color: #88aaff !important;
    text-align: center;
    font-size: 0.85rem;
    font-weight: normal !important;
    text-transform: lowercase;
    letter-spacing: 0.3rem;
    margin: 3rem 0 1.5rem 0;
    padding-top: 1.2rem;
  }

  ::placeholder {
    font-size: 0.9rem !important;
    color: #888888 !important;
  }

  .isso-input-wrapper,
  .isso-text-wrapper,
  .isso-text p,
  .isso-notification-section label {
    font-size: 0.8rem;
    color: #cccccc;
  }

  /* BOTÃO ENVIAR - SELETOR QUE FUNCIONA */
  .isso-form-wrapper input[type=button],
  .isso-form-wrapper input[type=submit] {
    background-color: #2a2a2a !important;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12rem;
    color: #ffffff !important;
    padding: 7px 10px 5px 10px !important;
    border: 1px solid #444444 !important;
    border-radius: 4px !important;
    cursor: pointer;
  }

  .isso-form-wrapper input[type=button]:hover,
  .isso-form-wrapper input[type=submit]:hover {
    background-color: #88aaff !important;
    color: #0e0525 !important;
  }

  .isso-textarea,
  .isso-auth-section input {
    border-color: #444444 !important;
    border-radius: 4px !important;
    background-color: #2a2a2a !important;
    color: #ffffff !important;
    padding: 0.5rem 0.6rem !important;
    box-shadow: none !important;
  }

  .isso-textarea {
    resize: vertical !important;
    font-size: 0.95rem;
  }

  textarea.isso-textarea:focus,
  .isso-auth-section input:focus {
    border-color: #88aaff !important;
    outline: none !important;
  }

  .isso-form-wrapper input[type=checkbox] {
    margin-right: 0.6rem;
    accent-color: #88aaff;
  }

  .isso-comment-header {
    font-size: 0.9rem !important;
  }

  .isso-comment-header a {
    color: #88aaff;
  }

  .isso-comment-footer {
    font-size: 0.75rem !important;
    text-transform: lowercase;
    letter-spacing: 0.15rem;
  }

  span.isso-author,
  span.isso-page-author-suffix {
    color: #ffffff;
  }

  a.isso-delete:hover,
  a.isso-edit:hover,
  a.isso-reply:hover {
    color: #88aaff !important;
  }

  .isso-comment .isso-text p {
    color: #dddddd;
    font-size: 0.95rem;
  }

  .isso-text a {
    color: #88aaff;
    overflow-wrap: break-word;
  }

  .isso-comment:not(:first-of-type),
  .isso-follow-up .isso-comment {
    border-top: 1px solid #333333 !important;
  }

  .isso-comment.isso-is-page-author > .isso-text-wrapper {
    background: linear-gradient(to bottom, #1a1a2e, transparent);
    border-radius: 0 0 5px 5px;
  }

  
  /* ========== LAYOUT EXATO - COMENTÁRIO ACIMA, CAMPOS LADO A LADO COM BOTÕES ========== */
  
  /* Container principal - flex para alinhar os campos com os botões */
  #isso-thread .isso-auth-section {
    display: flex !important;
    flex-wrap: wrap !important;
    align-items: flex-end !important;
    gap: 10px !important;
  }
  
  /* Cada wrapper de input (Nome, E-mail, Website) */
  #isso-thread .isso-input-wrapper {
    flex: 1 1 0px !important;
    min-width: 110px !important;
    position: relative !important;
    padding-top: 20px !important;
  }
  
  /* Labels flutuando acima */
  #isso-thread label[for="isso-postbox-author"],
  #isso-thread label[for="isso-postbox-email"],
  #isso-thread label[for="isso-postbox-website"] {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    font-size: 0 !important;
    white-space: nowrap !important;
  }
  
  #isso-thread label[for="isso-postbox-author"]::before {
    content: "Nome" !important;
    font-size: 0.75rem !important;
    color: #cccccc !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
  }
  
  #isso-thread label[for="isso-postbox-email"]::before {
    content: "E-mail" !important;
    font-size: 0.75rem !important;
    color: #cccccc !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
  }
  
  #isso-thread label[for="isso-postbox-website"]::before {
    content: "Website" !important;
    font-size: 0.75rem !important;
    color: #cccccc !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
  }
  
  /* Inputs ocupam 100% do wrapper */
  #isso-thread .isso-input-wrapper input {
    width: 100% !important;
    box-sizing: border-box !important;
    padding: 6px 8px !important;
    font-size: 0.8rem !important;
  }
  
  /* Container dos botões - alinhado à direita */
  #isso-thread .isso-post-action {
    display: flex !important;
    gap: 8px !important;
    margin-left: auto !important;
    padding-top: 20px !important;
  }
  
  /* Botões */
  .isso-form-wrapper input[type=submit],
  .isso-form-wrapper input[type=button] {
    padding: 6px 12px !important;
    font-size: 0.7rem !important;
    white-space: nowrap !important;
  }
  
  /* Campo de comentário */
  #isso-thread .isso-textarea-wrapper {
    margin-bottom: 10px !important;
  }
  
  /* Mobile: empilha */
  @media (max-width: 700px) {
    #isso-thread .isso-auth-section {
      flex-direction: column !important;
      align-items: stretch !important;
    }
    #isso-thread .isso-input-wrapper {
      min-width: 100% !important;
    }
    #isso-thread .isso-post-action {
      margin-left: 0 !important;
      justify-content: flex-start !important;
      padding-top: 5px !important;
    }
  }

  /* ========== FORÇA CHECKBOX ========== */
  #isso-thread .isso-notification-section {
    display: block !important;
    margin-top: 10px !important;
  }
  
  #isso-thread .isso-subscribe-to-replies {
    display: flex !important;
    align-items: center !important;
    gap: 6px !important;
  }
  
  #isso-thread .isso-subscribe-to-replies label {
    font-size: 0.7rem !important;
    color: #cccccc !important;
  }
  
  #isso-thread .isso-subscribe-to-replies input[type="checkbox"] {
    width: 14px !important;
    height: 14px !important;
    margin: 0 !important;
    accent-color: #88aaff !important;
  }

</style>

<!-- Script de placeholders (CIRÚRGICO - NÃO TOCA NO BOTÃO) -->
<script>
  (function() {
    function ajustarPlaceholders() {
      var author = document.querySelector('#isso-thread input[name="author"]');
      if (author) author.placeholder = 'opcional';
      
      var email = document.querySelector('#isso-thread input[type="email"]');
      if (email) email.placeholder = 'opcional';
      
      var website = document.querySelector('#isso-thread input[type="url"]');
      if (!website) website = document.querySelector('#isso-thread input[name="website"]');
      if (!website) website = document.querySelector('#isso-thread input[id*="website"]');
      if (website) website.placeholder = 'opcional';
      
      var textarea = document.querySelector('#isso-thread .isso-textarea');
      if (textarea) textarea.placeholder = 'Seu comentário (Markdown suportado)';
    }
    
    window.addEventListener('load', ajustarPlaceholders);
    setTimeout(ajustarPlaceholders, 500);
  })();
</script>
