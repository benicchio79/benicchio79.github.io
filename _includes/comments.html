<section id="isso-thread"></section>
<script data-isso="https://isso.divagar.blog/"
        data-isso-lang="pt_BR"
        src="https://isso.divagar.blog/js/embed.min.js"></script>

<script>
  (function() {
    function ajustarPlaceholders() {
      var campos = document.querySelectorAll('#isso-thread input, #isso-thread textarea');
      campos.forEach(function(campo) {
        if (campo.name === 'author') campo.placeholder = 'opcional';
        if (campo.type === 'email') campo.placeholder = 'opcional';
        if (campo.type === 'url' || campo.name === 'website') campo.placeholder = 'opcional';
        if (campo.classList.contains('isso-textarea')) campo.placeholder = 'Seu comentário (Markdown suportado)';
      });
    }
    ajustarPlaceholders();
    setTimeout(ajustarPlaceholders, 300);
    setTimeout(ajustarPlaceholders, 800);
  })();
</script>
