<li class="post-item">
  <div class="post-header">
    <a href="{{ include.post.url | relative_url }}" class="post-title">{{ include.post.title }}</a>
    <span class="post-date">{{ include.post.date | date: "%d.%m.%Y" }}</span>
  </div>
  <a href="{{ include.post.url | relative_url }}" class="post-description-link">
    <div class="post-description">{{ include.post.description | strip_html | truncate: 120 }}</div>
  </a>
</li>
