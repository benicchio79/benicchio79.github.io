<li class="post-item">
  <div class="post-header">
    <a href="{{ include.post.url | relative_url }}" 
       class="post-title" 
       data-description="{{ include.post.description | strip_html | escape }}">
      {{ include.post.title }}
    </a>
    <span class="post-date">{{ include.post.date | date: "%d.%m.%Y" }}</span>
  </div>
</li>
